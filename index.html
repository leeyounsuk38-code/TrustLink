<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TrustLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  text-align:center;
  padding:30px 20px;
">

  <div style="max-width:500px; margin:0 auto; padding:0 15px;">
  <img src="logo.png" style="width:100%; max-width:420px; display:block; margin:10px auto;">
</div>

  <p style="margin-bottom:14px;">Web3 Token Verification Platform</p>

  <div style="
    background:white;
    padding:25px;
    border-radius:20px;
    max-width:380px;
    margin:0 auto 50px auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
  ">
    <input
  id="searchInput"
  placeholder="Search token"
  oninput="searchToken()"
  onkeypress="if(event.key==='Enter') searchToken()"
  style="padding:12px; width:80%; max-width:260px; font-size:16px;"
>
    <br><br>
    <button
      onclick="searchToken()"
      style="
        padding:12px 22px;
        background:#4CAF50;
        color:white;
        border:none;
        border-radius:10px;
        font-size:16px;
      "
    >
      Search
    </button>

    <div id="resultBox" style="margin-top:20px;">
      <p>Search result will appear here</p>
    </div>
  </div>

  <h2 style="margin-top:50px;">UI Preview</h2>
  <img src="ui.png" width="95%" style="max-width:800px; border-radius:20px;">

  <script>
  async function searchToken() {
  const input = document.getElementById("searchInput").value.trim().toLowerCase();
  if (input.length < 2) {
  document.getElementById("resultBox").innerHTML = "";
  return;
}
  const res = await fetch("data/tokens.json?v=2");
  const data = await res.json();

  const results = data.filter(t =>
    t.name.toLowerCase().includes(input) ||
    t.symbol.toLowerCase().includes(input)
  );

  const box = document.getElementById("resultBox");

  if (results.length > 0) {
    let html = "";

    results.forEach(found => {
      let cardColor = "#e8f8ec";
      let borderColor = "#4CAF50";
      let titleText = "✅ Verified Token";
      let riskText = "LOW";

      if (found.risk_level === "high") {
        cardColor = "#fdecec";
        borderColor = "#e53935";
        titleText = "⚠ Warning: Suspicious Token";
        riskText = "HIGH";
      }

      html += `
        <div style="
          background:${cardColor};
          border:2px solid ${borderColor};
          border-radius:16px;
          padding:20px;
          text-align:left;
          margin-top:20px;
          box-shadow:0 6px 18px rgba(0,0,0,0.08);
        ">
          <h3 style="margin-top:0; color:${borderColor};">${titleText}</h3>
          <p><strong>Name:</strong> ${found.name}</p>
          <p><strong>Symbol:</strong> ${found.symbol}</p>
          <p><strong>Network:</strong> ${found.network}</p>
          <p><strong>Issuer:</strong> ${found.issuer}</p>
          <p><strong>Status:</strong> ${found.verification_status}</p>
          <p><strong>Trust Score:</strong> ${found.trust_score}</p>
          <p><strong>Risk Level:</strong> ${riskText}</p>
        </div>
      `;
    });

    box.innerHTML = html;

  } else {
    box.innerHTML = `
      <div style="
        background:#fff4e5;
        border:2px solid #ff9800;
        border-radius:16px;
        padding:20px;
        margin-top:20px;
        color:#cc7a00;
        font-weight:bold;
      ">
        ❌ Token not found
      </div>
    `;
  }
}

  </script>

</body>
</html>
